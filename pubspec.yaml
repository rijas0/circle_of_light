name: circle_of_light
description: "Circle of Light - a social accountability platform for Quran engagement."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: Noto Sans Arabic
      fonts:
        - asset: assets/fonts/Noto_Sans_Arabic/NotoSansArabic-Regular.ttf
          weight: 400
        - asset: assets/fonts/Noto_Sans_Arabic/NotoSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/Noto_Sans_Arabic/NotoSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Noto_Sans_Arabic/NotoSansArabic-Bold.ttf
          weight: 700
        - asset: assets/fonts/Noto_Sans_Arabic/NotoSansArabic-Black.ttf
          weight: 900
